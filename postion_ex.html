<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포지션 연습</title>
    <style>
        div{
            width: 100px;
            height: 100px;
            background-color: cornflowerblue;
        }
        .box1{
            position: absolute;
            left: 0;
            top: 0;
        }
        .box2{
            position: absolute;
            right: 0;
            top: 0;
        }
        .box3{
            position: absolute;
            left: 0;
            bottom: 0;
        }
        .box4{
            position: absolute;
            right: 0;
            bottom: 0;
        }
        .box5{
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50% , -50%);
        }
        .box6{
            position: absolute;
            left: 0;
            top: 50%;
            transform: translate(0 , -50%);
            background-color: skyblue;
        }
        .box7{
            position: absolute;
            right: 0;
            top: 50%;
            transform: translate(0 , -50%);
            background-color: rgb(186, 240, 240);
        }
        .box8{
            position: absolute;
            right: 50%;
            top: 30%;
            transform: translate(50% , 0);
            background-color: lightblue;
        }
        .box9{
            position: absolute;
            left: 30%;
            top: 57%;
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5"></div>
    <div class="box6"></div>
    <div class="box7"></div>
    <div class="box8"></div>
    <div class="box9"></div>
</body>
</html>
